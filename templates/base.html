<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematch - Premium Movie Recommendations</title>
    <!-- Modern Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <!-- Glassmorphism Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">Cine<span>match</span></a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="#">Categories</a>
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Guest+User&background=0D8ABC&color=fff" alt="User Profile">
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Cinematch. Powered by ShaktiDB & Flask.</p>
    </footer>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
